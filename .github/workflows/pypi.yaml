name: Publish Python Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    # IMPORTANT: These permissions are required for OIDC authentication
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        # Using the modern build command we debugged earlier!
        run: python -m build
        working-directory: ./src/pybullet_grasper

      - name: Publish package to PyPI
        # This official action automatically handles the OIDC token exchange
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./src/pybullet_grasper/dist/